services:
  data_loader:
    restart: "no"
    image: ghcr.io/inesortega/mapapellets:latest
    container_name: data_loader
    volumes:
      - ./data:/app/data
      - ./.secrets:/app/.secrets:ro
    networks:
      - pellets
    environment:
      - GOOGLE_SHEETS_JSON_KEY=/app/.secrets/earnest-vine-377812-6ae11f6184bc.json
      - ENV=docker
    command: ["R", "-e", "source('/app/update_historical.R')"]

  pellets-shiny:
    restart: always
    image: ghcr.io/inesortega/mapapellets:latest
    # 'build' mantense para desenvolvemento local / fallback offline.
    # No servidor úsase 'docker compose pull' para baixar a imaxe de GHCR.
    build: .
    container_name: pellets-shiny
    volumes:
      - ./data:/app/data
    networks:
      - pellets
    environment:
      - ENV=docker
    command: ["R", "-e", "shiny::runApp('/app', host='0.0.0.0', port=3838)"]

  nginx:
    restart: always
    image: nginx:latest
    container_name: nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /srv/www/acme:/srv/www/acme
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - /etc/letsencrypt/live/noialimpapellets.publicvm.com/fullchain.pem:/etc/letsencrypt/live/noialimpapellets.publicvm.com/fullchain.pem:ro
      - /etc/letsencrypt/live/noialimpapellets.publicvm.com/privkey.pem:/etc/letsencrypt/live/noialimpapellets.publicvm.com/privkey.pem:ro
    networks:
      - pellets
    depends_on:
      - pellets-shiny

networks:
  pellets:
    driver: bridge
