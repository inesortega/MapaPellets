services:
  # A actualización dos datos NON corre nun contedor aparte: un cron no host
  # lanza `docker compose exec pellets-shiny Rscript /app/update_once.R <modo>`
  # contra este mesmo contedor. O proceso de actualización vive uns segundos e
  # sae, liberando a memoria. Configúrao scripts/setup_cron.sh.
  pellets-shiny:
    restart: always
    image: ghcr.io/inesortega/mapapellets:latest
    # 'build' mantense para desenvolvemento local / fallback offline.
    # No servidor úsase 'docker compose pull' para baixar a imaxe de GHCR.
    build: .
    container_name: pellets-shiny
    volumes:
      - ./data:/app/data
      # O secreto de Google Sheets necesítao update_once.R (lanzado por cron).
      - ./.secrets:/app/.secrets:ro
    networks:
      - pellets
    environment:
      - ENV=docker
      - GOOGLE_SHEETS_JSON_KEY=/app/.secrets/earnest-vine-377812-6ae11f6184bc.json
    command: ["R", "-e", "shiny::runApp('/app', host='0.0.0.0', port=3838)"]

  nginx:
    restart: always
    image: nginx:latest
    container_name: nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /srv/www/acme:/srv/www/acme
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      # Móntase todo /etc/letsencrypt: os .pem en live/ son symlinks a archive/,
      # e así as renovacións vense sen recrear o contedor.
      - /etc/letsencrypt:/etc/letsencrypt:ro
    networks:
      - pellets
    depends_on:
      - pellets-shiny

networks:
  pellets:
    driver: bridge
