map $http_upgrade $connection_upgrade {
  default upgrade;
  '' close;
}

upstream shiny_app {
    server pellets-shiny:3838;  # service name on the docker network
}

server {
    listen 80;
    listen [::]:80;
    server_name noialimpapellets.publicvm.com;

    location ^~ /.well-known/acme-challenge/ {
        root /srv/www/acme;
        default_type text/plain;
        try_files $uri =404;
    }

    location / {
        return 301 https://noialimpapellets.publicvm.com$request_uri;
    }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name noialimpapellets.publicvm.com;

    ssl_certificate /etc/letsencrypt/live/noialimpapellets.publicvm.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/noialimpapellets.publicvm.com/privkey.pem;

    location / {
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_pass http://pellets-shiny:3838;
        proxy_read_timeout 20d;
        proxy_buffering off;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_http_version 1.1;
    }
}
