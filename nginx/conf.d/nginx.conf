map $http_upgrade $connection_upgrade {
  default upgrade;
  '' close;
}

server {
    listen 80;
    listen [::]:80;
    server_name noialimpapellets.publicvm.com;

    location ^~ /.well-known/acme-challenge/ {
        root /srv/www/acme;
        default_type text/plain;
        try_files $uri =404;
    }

    location / {
        return 301 https://noialimpapellets.publicvm.com$request_uri;
    }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name noialimpapellets.publicvm.com;

    ssl_certificate /etc/letsencrypt/live/noialimpapellets.publicvm.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/noialimpapellets.publicvm.com/privkey.pem;

    # Resolver de Docker + upstream nunha variable: nginx NON resolve o nome no
    # arranque, así arranca aínda que pellets-shiny non estea listo (devolve 502
    # en vez de morrer con "host not found in upstream" e entrar en crash-loop).
    resolver 127.0.0.11 valid=10s ipv6=off;
    set $upstream pellets-shiny:3838;

    location / {
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_pass http://$upstream;
        proxy_read_timeout 20d;
        proxy_buffering off;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_http_version 1.1;
    }
}
